    }
    // ══ END LOCAL PARSER ══════════════════════════════════════════════

    // ── API prompt builder ─────────────────────────────────────────────
    // ── API: JSON-only prompt (no CSS/JS/boilerplate in output) ───────
    function buildVRPrompt(rawText, title, subtitle) {
      return `You are an editorial analyst. Parse the following text and return ONLY a JSON object — no markdown fences, no explanation, nothing else.

The JSON must match this exact shape:
{
  "sections": [
    {
      "id": "section-1",
      "title": "Section Title",
      "sev": null,
      "content": [
        { "type": "p", "text": "Plain paragraph text." },
        { "type": "h3", "text": "Subheading" },
        { "type": "list", "ordered": false, "items": [
            { "text": "Item one", "sev": "critical" },
            { "text": "Item two", "sev": null }
        ]},
        { "type": "code", "text": "verbatim code or quoted text here" },
        { "type": "comparison", "before": "old text", "after": "new text", "why": "reason it is stronger" },
        { "type": "resolution", "label": "✓ Resolution", "text": "resolution text" },
        { "type": "flag", "label": "Flag Title", "sev": "important", "text": "description" },
        { "type": "blockquote", "text": "quoted text" },
        { "type": "rule" }
      ]
    }
  ]
}

FIELD RULES:
- "sev" on a section or item: null | "critical" | "important" | "minor"
  Detect from language: critical/must/error/conflict → "critical"; important/suggested/flag/warning → "important"; optional/minor/consider → "minor"
- "type" values: p | h3 | list | code | comparison | resolution | flag | blockquote | rule
- For "comparison": include "why" only if a "why it's stronger" or rationale sentence follows the after text
- All text values: plain text only, no markdown — use ** for bold and * for italic if needed, they will be rendered
- Keep all section titles, content, and wording faithful to the source — do not summarize or rewrite
- "id" values: "section-1", "section-2", etc. in order

REPORT TITLE: "${title}"
REPORT SUBTITLE: "${subtitle || 'Editorial Analysis'}"

INPUT TEXT:
---
${rawText}
---

Output the JSON object now. Start with { and end with }.`;
    }

    // ── Assemble full HTML from JSON payload (template is pre-baked) ──
    function assembleFromJSON(json, title, subtitle) {
      const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

      function inlineMd(s) {
        return esc(s)
          .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
          .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
          .replace(/\*(.+?)\*/g,'<em>$1</em>')
          .replace(/`([^`]+)`/g,'<code style="background:rgba(0,0,0,0.3);padding:1px 5px;border-radius:3px;font-size:.9em;font-family:monospace">$1</code>');
      }

      const sevColor = { critical:'#e74c3c', important:'#f39c12', minor:'#27ae60' };
      const sevBg    = { critical:'rgba(231,76,60,0.08)', important:'rgba(243,156,18,0.06)', minor:'rgba(39,174,96,0.06)' };
      const sevLabel = { critical:'Critical', important:'Important', minor:'Minor' };

      function renderBlock(b) {
        switch (b.type) {
          case 'p':
            return `<p style="font-size:14px;color:#c8c4d4;line-height:1.75;margin:8px 0">${inlineMd(b.text)}</p>`;
          case 'h3':
            return `<h3 style="font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:#e8e4f0;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.07)">${inlineMd(b.text)}</h3>`;
          case 'rule':
            return `<hr style="border:none;border-top:1px solid rgba(232,201,110,0.15);margin:24px 0">`;
          case 'blockquote':
            return `<blockquote style="background:rgba(232,201,110,0.05);border-left:3px solid rgba(232,201,110,0.4);border-radius:0 8px 8px 0;margin:12px 0;padding:12px 16px;color:var(--text3);font-style:italic">${inlineMd(b.text)}</blockquote>`;
          case 'code':
            return `<div style="background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px 16px;margin:12px 0;font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:var(--text4);line-height:1.7;overflow-x:auto;white-space:pre-wrap">${esc(b.text)}</div>`;
          case 'resolution': {
            const lbl = b.label || '✓ Resolution';
            return `<div style="background:rgba(39,174,96,0.07);border:1px solid rgba(39,174,96,0.2);border-radius:8px;padding:16px 18px;margin:14px 0">
              <div style="font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#6bffaa;margin-bottom:10px;font-weight:600">${esc(lbl)}</div>
              <div style="font-size:13px;color:#e8e4f0;line-height:1.7">${inlineMd(b.text)}</div>
            </div>`;
          }
          case 'comparison': {
            const why = b.why ? `<div style="grid-column:1/-1;background:rgba(232,201,110,0.07);border-top:1px solid rgba(232,201,110,0.15);padding:10px 16px;font-size:12px;color:#e8c96e">${inlineMd(b.why)}</div>` : '';
            return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.07);border-radius:8px;overflow:hidden;margin:14px 0">
              <div style="background:rgba(231,76,60,0.07);padding:14px 16px">
                <div style="font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:#ff6b6b;margin-bottom:8px;font-weight:600">Before</div>
                <div style="font-size:13px;color:#e8e4f0;line-height:1.7;font-style:italic">${inlineMd(b.before)}</div>
              </div>
              <div style="background:rgba(39,174,96,0.07);padding:14px 16px">
                <div style="font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:#6bffaa;margin-bottom:8px;font-weight:600">After</div>
                <div style="font-size:13px;color:#e8e4f0;line-height:1.7">${inlineMd(b.after)}</div>
              </div>
              ${why}
            </div>`;
          }
          case 'flag': {
            const c  = b.sev ? sevColor[b.sev] : '#e8c96e';
            const bg = b.sev ? sevBg[b.sev]    : 'rgba(255,255,255,0.03)';
            const pill = b.sev ? `<span style="background:${c}33;color:${c};font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 10px;border-radius:999px;border:1px solid ${c}66">${sevLabel[b.sev]}</span>` : '';
            return `<div style="background:${bg};border:1px solid ${b.sev ? c+'33' : 'rgba(255,255,255,0.07)'};border-left:3px solid ${c};border-radius:8px;padding:14px 18px;margin:10px 0">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">${pill}<span style="font-size:14px;font-weight:600;color:#e8e4f0">${inlineMd(b.label||'')}</span></div>
              <div style="font-size:13px;color:var(--text4);line-height:1.7">${inlineMd(b.text||'')}</div>
            </div>`;
          }
          case 'list': {
            const tag = b.ordered ? 'ol' : 'ul';
            const items = (b.items || []).map((item, idx) => {
              const c  = item.sev ? sevColor[item.sev] : (b.ordered ? '#e8c96e' : 'rgba(232,201,110,0.5)');
              const bg = item.sev ? sevBg[item.sev]    : 'transparent';
              const marker = b.ordered
                ? `<span style="min-width:22px;height:22px;border-radius:50%;border:1px solid ${c};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${c};flex-shrink:0">${idx+1}</span>`
                : `<span style="color:${c};margin-top:3px;flex-shrink:0">●</span>`;
              return `<li style="display:flex;gap:10px;align-items:flex-start;padding:8px 12px;background:${bg};border-radius:6px${item.sev?';border-left:2px solid '+c:''}">
                ${marker}
                <span style="font-size:13px;color:#e8e4f0;line-height:1.6">${inlineMd(item.text)}</span>
              </li>`;
            }).join('');
            return `<${tag} style="list-style:none;padding:0;margin:10px 0;display:flex;flex-direction:column;gap:6px">${items}</${tag}>`;
          }
          default: return '';
        }
      }

      const sections = json.sections || [];
      const sidebarLinks = sections.map((s,i) =>
        `<a href="#${s.id}" class="nav-link"><span class="nav-num">${String(i+1).padStart(2,'0')}</span>${esc(s.title)}</a>`
      ).join('\n');
      const tocGrid = sections.map((s,i) =>
        `<a href="#${s.id}" class="toc-entry"><span class="num">${String(i+1).padStart(2,'0')}</span><span class="title">${esc(s.title)}</span></a>`
      ).join('\n');
      const cards = sections.map((s,i) => {
        const c = s.sev ? sevColor[s.sev] : '#e8c96e';
        const pill = s.sev ? `<p class="section-subtitle"><span style="color:${c};font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">${sevLabel[s.sev]}</span></p>` : '';
        const content = (s.content || []).map(renderBlock).join('\n');
        return `<section id="${s.id}" class="section-card">
          <div class="section-header">
            <div class="section-badge">${i+1}</div>
            <div class="section-title-wrap" style="border-left:3px solid ${c}">
              <h2 class="section-title">${esc(s.title)}</h2>${pill}
            </div>
          </div>
          ${content}
        </section>`;
      }).join('\n');

      return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(title)}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-page:#0d0d14;--bg-s1:#12121e;--bg-s2:#1a1a2e;--bg-card:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.07);--border-hv:rgba(232,201,110,0.3);--gold:#e8c96e;--gold-dim:rgba(232,201,110,0.15);--red:#e74c3c;--amber:#f39c12;--green:#27ae60;--text:#e8e4f0;--text-2:#9090b0;--text-3:#5a5a7a;--r:12px;--r-sm:8px;--r-pill:999px}
body{background:var(--bg-page);background-image:radial-gradient(ellipse at 20% 20%,rgba(232,201,110,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(52,152,219,0.04) 0%,transparent 50%);font-family:'Inter',-apple-system,sans-serif;color:var(--text);line-height:1.6;min-height:100vh}
.sidebar-nav{position:fixed;top:0;left:0;width:210px;height:100vh;overflow-y:auto;background:var(--bg-s1);border-right:1px solid var(--border);padding:20px 0;z-index:100}
.sidebar-logo{padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-logo span{font-size:12px;color:var(--gold);letter-spacing:.02em}
.nav-link{display:block;padding:9px 20px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2);text-decoration:none;border-left:3px solid transparent;transition:all .2s}
.nav-link:hover,.nav-link.active{background:var(--gold-dim);border-left-color:var(--gold);color:var(--text)}
.nav-link .nav-num{color:var(--gold);opacity:.6;margin-right:8px}
.page-shell{margin-left:210px;min-width:0}
.hero{background:linear-gradient(135deg,#0a0a10 0%,#12122a 50%,#0a0a10 100%);border-bottom:1px solid var(--border);position:relative;overflow:hidden;padding:60px 40px;text-align:center}
.hero::before{content:'';position:absolute;top:-150px;right:-150px;width:400px;height:400px;border-radius:50%;border:1px solid rgba(232,201,110,0.06)}
.hero::after{content:'';position:absolute;bottom:-100px;left:-100px;width:250px;height:250px;border-radius:50%;border:1px solid rgba(52,152,219,0.06)}
.hero-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--text-2);margin-bottom:12px;position:relative;z-index:1}
.hero-title{font-family:'Playfair Display',Georgia,serif;font-size:42px;font-style:italic;color:var(--gold);text-shadow:0 0 40px rgba(232,201,110,0.3);position:relative;z-index:1;margin-bottom:4px}
.hero-subtitle{font-size:14px;color:var(--text-2);position:relative;z-index:1;margin-bottom:16px}
.hero-rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);width:60%;margin:0 auto 16px;position:relative;z-index:1}
.main-content{max-width:860px;margin:0 auto;padding:32px 24px 64px;box-sizing:border-box;width:100%}
.toc{background:var(--bg-s1);border-radius:var(--r);padding:24px 28px;margin-bottom:28px}
.toc-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.toc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 20px}
.toc-entry{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--r-sm);text-decoration:none;transition:all .15s;border-left:2px solid transparent}
.toc-entry:hover{background:var(--gold-dim);border-left-color:var(--gold)}
.toc-entry .num{font-size:10px;color:var(--gold);opacity:.7;min-width:26px}
.toc-entry .title{font-size:13px;font-weight:500;color:var(--text-2)}
.toc-entry:hover .title{color:var(--text)}
.section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;margin-bottom:24px;width:100%;box-sizing:border-box;overflow:hidden;transition:border-color .2s}
.section-card:hover{border-color:var(--border-hv)}
.section-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.section-badge{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold)}
.section-title-wrap{padding-left:12px}
.section-title{font-family:'Playfair Display',Georgia,serif;font-size:21px;color:var(--text);font-weight:400}
.section-subtitle{font-size:12px;color:var(--text-2);margin-top:3px}
@media(max-width:860px){.sidebar-nav{display:none}.page-shell{margin-left:0}.main-content{padding:16px 12px 40px}.toc-grid{grid-template-columns:1fr}.hero{padding:40px 20px}.hero-title{font-size:28px}}
@media print{.sidebar-nav,.no-print{display:none!important}.page-shell{margin-left:0}body{background:#fff!important;color:#111!important}.section-card{background:#fff!important;border:1px solid #ddd!important;page-break-inside:avoid}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg-s1)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<nav class="sidebar-nav">
  <div class="sidebar-logo"><span>📋 Editorial Report</span></div>
  ${sidebarLinks}
</nav>
<div class="page-shell">
  <header class="hero">
    <div class="hero-eyebrow">Editorial Analysis Report</div>
    <h1 class="hero-title">${esc(title)}</h1>
    ${subtitle ? `<p class="hero-subtitle">${esc(subtitle)}</p>` : ''}
    <div class="hero-rule"></div>
  </header>
  <main class="main-content">
    <nav class="toc">
      <h2 class="toc-title">Table of Contents</h2>
      <div class="toc-grid">${tocGrid}</div>
    </nav>
    ${cards}
  </main>
</div>
<script>
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{const t=document.querySelector(a.getAttribute('href'));if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'})}});
});
if('IntersectionObserver' in window){
  const links=document.querySelectorAll('.nav-link');
  new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){const id=e.target.id;links.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+id))}})},{threshold:0.3})
  .observe||document.querySelectorAll('.section-card').forEach(s=>new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+e.target.id))}})},{threshold:0.3}).observe(s));
  document.querySelectorAll('.section-card').forEach(s=>{const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)links.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+e.target.id))})},{threshold:0.3});obs.observe(s)});
}
<\/script>
</body>
</html>`;
    }

  })();
  </script>

</body>

</html>
