      document.getElementById('timeline_import_file').addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (event) {
          try {
            const data = JSON.parse(event.target.result);
            if (!Array.isArray(data)) throw new Error('Invalid format');
            const merge = confirm('Merge with existing timeline? OK to merge, Cancel to replace all.');
            if (merge) {
              const existing = getSeriesTimeline();
              data.forEach(ev => { if (!existing.find(e => e.id === ev.id)) existing.push(ev); });
              saveSeriesTimeline(existing);
            } else {
              saveSeriesTimeline(data);
            }
            renderTimelineList();
            alert('Timeline imported successfully!');
          } catch (err) {
            alert('Error importing: ' + err.message);
          }
        };
        reader.readAsText(file);
        this.value = '';

      const editor = document.getElementById('p_editor'); if (!editor) return;

      let pr = APP.prompts.promptId ? (PROMPTS[APP.prompts.cat] || []).find(p => p.id === APP.prompts.promptId) : null;
      // Then check custom templates
      if (!pr && APP.prompts.promptId && APP.prompts.promptId.startsWith('custom-')) {
        const customList = getCustomTemplatesForCategory(APP.prompts.cat) || [];
        const customTpl = customList.find(t => t.id === APP.prompts.promptId);
        if (customTpl) {
          // Convert string template to function using a safer method
          pr = {
            id: customTpl.id,
            title: customTpl.title,
            desc: customTpl.desc,
            fields: customTpl.fields,
            tpl: function (f) {
              let result = customTpl.tpl;
              if (customTpl.fields) {
                customTpl.fields.forEach(field => {
                  const regex = new RegExp('\\$\\{f\\.' + field.key + '\\}', 'g');
                  result = result.replace(regex, f[field.key] || '');
                });
              }
              return result;
            }
          };
        }
      }
      if (!pr) {
        const pills = getContextPills();
        editor.innerHTML = `<div class="p-empty">
      <h3>Select a prompt to begin</h3>
      <p>${pills.length ? pills.length + ' context section' + (pills.length > 1 ? 's' : '') + ' active' : 'Add context in Series / Book / Chapter tabs'}</p>
    </div>`;
        return;

      const pills = getContextPills();
      editor.innerHTML = `

    <div class="ctx-bar">
      <span class="ctx-bar-lbl">Context:</span>
      <div class="ctx-pills">
        ${pills.length === 0 ? '<span class="ctx-none">none</span>' : pills.map(pi => `<span class="cpill c${pi.mode}">${esc(pi.label)}</span>`).join('')}

    <div class="out-area">

        <div class="out-status" id="out_status"><span>Ready</span></div>
        <div class="out-btns">
          <button class="sec-btn" id="copy_prompt_btn">Copy Prompt</button>
          <button class="sec-btn" id="copy_out_btn" disabled>Copy Output</button>
          <button class="sec-btn" id="dl_out_btn" disabled>↓ .md</button>
          <button class="report-btn" id="vr_btn" disabled title="Convert output to a styled HTML report">⬡ Visual Report</button>
          <button class="sec-btn" id="cmp_btn" disabled title="Add this output to the Compare tab">+ Compare</button>
          <button class="sec-btn" onclick="showTokenBreakdown(APP.prompts.tpl, APP.prompts.fields)" style="margin-left:8px">📊 Breakdown</button>
          <button class="stop-btn" id="stop_btn" style="display:none">■ Stop</button>
          <button class="run-btn" id="run_btn" ${APP.apiKey ? '' : 'title="Add API key in Settings"'}>▶ Run</button>
        </div>
      </div>
      <div class="out-text" id="out_text"><span class="out-placeholder">Output will appear here…</span></div>
    </div>`;

      // Restore field values
      pr.fields.forEach(f => {

        if (el && APP.prompts.fields[f.key]) el.value = APP.prompts.fields[f.key];

        const genre = buildGenreCompareInstructions();

        navigator.clipboard.writeText(full).then(() => {
          const btn = document.getElementById('copy_prompt_btn');
          btn.textContent = '✓ Copied'; btn.classList.add('ok');
          setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('ok'); }, 2000);

          btn.textContent = '✓ Copied'; btn.classList.add('ok');
          setTimeout(() => { btn.textContent = 'Copy Output'; btn.classList.remove('ok'); }, 2000);

      document.getElementById('stop_btn').addEventListener('click', () => {
        if (APP.prompts.abortCtrl) APP.prompts.abortCtrl.abort();
        APP.prompts.running = false;
        setRunState(false);
      });

      // Token warning function
      function updateTokenWarning() {
        const ctx = buildContext();
        const prefs = buildWritingPrefsInstructions();
        const genre = buildGenreCompareInstructions();
        const full = genre + prefs + ctx + pr.tpl(APP.prompts.fields);
        const estTokens = Math.round(full.length / 4);
        const limit = APP.maxTokens + (parseInt(document.getElementById('tok_boost')?.value) || 0);
        const pct = (estTokens / limit) * 100;
        const warningEl = document.getElementById('token_warning');
        if (!warningEl) return;
        if (pct > 100) {
          warningEl.className = 'token-warning err';
          warningEl.textContent = `~${(estTokens / 1000).toFixed(1)}k / ${(limit / 1000).toFixed(0)}k (OVER)`;
        } else if (pct > 80) {
          warningEl.className = 'token-warning warn';
          warningEl.textContent = `~${(estTokens / 1000).toFixed(1)}k / ${(limit / 1000).toFixed(0)}k`;
        } else {
          warningEl.className = 'token-warning ok';
          warningEl.textContent = `~${(estTokens / 1000).toFixed(1)}k tokens`;
        }
      }

      // Add token warning element
      const statusEl = document.getElementById('out_status');
      if (statusEl) {
        const tw = document.createElement('span');
        tw.id = 'token_warning';
        tw.className = 'token-warning ok';
        tw.style.marginLeft = '8px';
        statusEl.appendChild(tw);
        updateTokenWarning();
      }

      // Add input listeners to update token warning
      pr.fields.forEach(f => {
        const el = editor.querySelector(`[data-key="${f.key}"]`);
        if (el) el.addEventListener('input', updateTokenWarning);
      });

      // Run
      document.getElementById('run_btn').addEventListener('click', () => {
        if (APP.prompts.running) return;
        const ctx = buildContext();
        const prefs = buildWritingPrefsInstructions();
        const genre = buildGenreCompareInstructions();
        const prompt = genre + prefs + ctx + pr.tpl(APP.prompts.fields);
        APP.prompts.running = true;
        APP.prompts.output = '';
        APP.prompts.abortCtrl = new AbortController();

        const outText = document.getElementById('out_text');
        outText.textContent = '';
        const cursor = document.createElement('span');
        cursor.className = 'cursor-blink';
        outText.appendChild(cursor);

        setRunState(true);
        const t0 = Date.now();

        callAPI(prompt,
          chunk => {
            APP.prompts.output += chunk;
            outText.textContent = APP.prompts.output;
            outText.appendChild(cursor);
            outText.scrollTop = outText.scrollHeight;
          },
          () => {
            APP.prompts.running = false;
            outText.textContent = APP.prompts.output;
            setRunState(false, `Done · ${((Date.now() - t0) / 1000).toFixed(1)}s`);
            document.getElementById('copy_out_btn').disabled = false;
            document.getElementById('dl_out_btn').disabled = false;
            document.getElementById('vr_btn').disabled = false;
            document.getElementById('cmp_btn').disabled = false;
            // Log to activity
            const pr = APP.prompts;
            const cat = CATEGORIES.find(c => c.id === pr.cat);
            addActivityLogEntry(`Generated: ${pr.promptId} (${cat?.label || pr.cat})`);
          },
          err => {
            APP.prompts.running = false;
            outText.textContent = 'Error: ' + err;
            setRunState(false, 'Error');
          },
          APP.prompts.abortCtrl.signal
        );
      });

      // Add help icon to Prompts editor
      const editorHd = editor.querySelector('.p-ehd');
      if (editorHd) {
        editorHd.style.position = 'relative';
        addHelp(editorHd, '<b>Context:</b> Shows what context sections (Series, Book, Chapter, Settings) are being included in the prompt.<br><br><b>Run:</b> Sends your prompt + context to the AI using your configured API.<br><br><b>Copy Prompt:</b> Copies the full prompt text (without running) to clipboard.<br><br><b>On/Off:</b> Toggle settings in Chapter tab to include or exclude them from context.');
      }
    }

    function setRunState(running, statusText = null) {
      const runBtn = document.getElementById('run_btn');
      const stopBtn = document.getElementById('stop_btn');
      const status = document.getElementById('out_status');
      if (!runBtn) return;
      if (running) {
        runBtn.textContent = 'Running…'; runBtn.classList.add('running'); runBtn.disabled = true;
        stopBtn.style.display = 'inline-block';
        status.innerHTML = '<span class="spin"></span><span>Generating…</span>';
      } else {
        runBtn.textContent = '▶ Run'; runBtn.classList.remove('running'); runBtn.disabled = false;
        stopBtn.style.display = 'none';
        status.innerHTML = `<span>${statusText || 'Ready'}</span>`;
      }
    }

    function getCmpSlots() {
      try { return JSON.parse(localStorage.getItem('na_compare_slots') || '[]'); } catch { return []; }
    }
    function saveCmpSlots(slots) {
      localStorage.setItem('na_compare_slots', JSON.stringify(slots));
    }

    function addToCompare(item) {
      const slots = getCmpSlots();
      slots.push({ id: 'cmp-' + Date.now(), ...item });
      saveCmpSlots(slots);
      // If compare tab is open, re-render the sidebar
      if (APP.tab === 'compare') renderCompareSidebar();
    }

    async function runCompareAnalysis() {
      const slots = getCmpSlots();
      if (slots.length < 2) return;

      const mode = document.getElementById('cmp-mode-select')?.value || 'full';
      const runBtn = document.getElementById('cmp-run-btn');
      const output = document.getElementById('cmp-output');

      runBtn.disabled = true;
      runBtn.textContent = 'Analysing…';
      setCmpStatus('Calling AI…');
      output.innerHTML = `<div class="cmp-placeholder"><div class="cmp-placeholder-icon" style="animation:pulse 1.5s ease-in-out infinite">⇄</div><p>Detecting conflicts…</p></div>`;

      const prompt = buildComparePrompt(slots, mode);
      let raw = '';

      try {
        await callAPI(
          prompt,
          chunk => { raw += chunk; },
          () => {
            try {
              let clean = raw.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```\s*$/i,'').trim();
              const start = clean.indexOf('{'); if (start > 0) clean = clean.slice(start);
              const json = JSON.parse(clean);
              renderCompareOutput(json, mode);
              output.dataset.rawOutput = JSON.stringify(json);
              document.getElementById('cmp-vr-btn').disabled = false;
              setCmpStatus(`Done · ${json.conflicts?.length || 0} conflicts · ${json.consensus?.length || 0} consensus · ${json.allIssues?.length || 0} total issues`);
            } catch (e) {
              output.innerHTML = `<div style="padding:20px;color:var(--accent3);font-size:13px">JSON parse error — try again.<br><small>${e.message}</small></div>`;
              setCmpStatus('Parse error', true);
            }
            runBtn.disabled = false;
            runBtn.textContent = '⇄ Run Conflict Analysis';
          },
          err => {
            setCmpStatus('Error: ' + err, true);
            output.innerHTML = `<div style="padding:20px;color:var(--accent3);font-size:13px">Error: ${esc(err)}</div>`;
            runBtn.disabled = false;
            runBtn.textContent = '⇄ Run Conflict Analysis';
          },
          null
        );
      } catch (err) {
        setCmpStatus('Error: ' + err.message, true);
        runBtn.disabled = false;
        runBtn.textContent = '⇄ Run Conflict Analysis';
      }
    }

    function buildComparePrompt(slots, mode) {
      const analyses = slots.map((s, i) =>
        `=== ANALYSIS ${i + 1}: ${s.label} (${s.category}) ===\n${s.output}\n`
      ).join('\n');

      const modeInstr = {
        full: 'Return ALL THREE arrays: conflicts, consensus, allIssues.',
        conflicts: 'Return conflicts and consensus arrays. Set allIssues to [].',
        consensus: 'Return consensus and allIssues arrays. Set conflicts to [].',
      }[mode] || 'Return ALL THREE arrays.';

      return `You are a rigorous editorial conflict detector reviewing ${slots.length} analyses of the same text.

CRITICAL RULES — you must follow these exactly:
1. Do NOT summarize, condense, paraphrase, or merge any issue. Every specific flag must survive verbatim.
2. Your ONLY synthesis task is: find contradictions and find agreements.
3. Reproduce every issue from every analysis in full in allIssues. Do not truncate.
4. When two analyses comment on the same passage or element with contradictory advice, that is a conflict.
5. When two or more analyses independently flag the same problem (even with different wording), that is consensus.

${modeInstr}

Return ONLY a JSON object in this exact shape — no markdown fences, no preamble:
{
  "conflicts": [
    {
      "element": "brief label for the passage or element in question",
      "sev": "critical|important|minor",
      "sides": [
        { "source": "Analysis 1 label", "stance": "exact quote of what this analysis says" },
        { "source": "Analysis 2 label", "stance": "exact quote of what this analysis says" }
      ],
      "nature": "one sentence explaining the contradiction"
    }
  ],
  "consensus": [
    {
      "element": "brief label",
      "sev": "critical|important|minor",
      "sources": ["Analysis 1 label", "Analysis 2 label"],
      "finding": "verbatim or near-verbatim reproduction of the shared finding"
    }
  ],
  "allIssues": [
    {
      "source": "Analysis N label",
      "sev": "critical|important|minor",
      "element": "brief label",
      "body": "full verbatim text of the issue as written in the original analysis"
    }
  ]
}

Sev detection: critical/must/error/conflict → "critical"; important/suggested/flag/warning → "important"; optional/minor/consider → "minor". Default to "important" if unclear.

ANALYSES TO COMPARE:
${analyses}

Output the JSON object now. Start with {`;
    }

    function renderCompareOutput(json, mode) {
      const output = document.getElementById('cmp-output');
      const slots = getCmpSlots();
      const slotColors = ['#c8a660','#7aac74','#6090c8','#c87050','#a870c8','#50b8c8'];

      function sevTag(sev) {
        const cls = sev === 'critical' ? 'sev-critical' : sev === 'important' ? 'sev-important' : 'sev-minor';
        return `<span class="cmp-issue-tag ${cls}">${sev || 'note'}</span>`;
      }
      function sourceTag(src, idx) {
        const color = slotColors[slots.findIndex(s => s.label === src) % slotColors.length] || '#c8a660';
        return `<span class="cmp-issue-tag source-tag" style="color:${color};border-color:${color}44">${esc(src)}</span>`;
      }

      let html = '';

      // ── Conflicts ──
      const conflicts = json.conflicts || [];
      if (conflicts.length > 0) {
        html += `<div class="cmp-section">
          <div class="cmp-section-title">⚡ Conflicts <span class="cmp-section-count">${conflicts.length} found</span></div>
          ${conflicts.map(c => `
            <div class="cmp-issue-card conflict">
              <div>${sevTag(c.sev)}<span class="cmp-issue-tag conflict-tag">Conflict</span><strong style="font-size:13px;color:var(--text)">${esc(c.element)}</strong></div>
              <div class="cmp-conflict-sides">
                ${(c.sides || []).map((side, si) => `
                  <div class="cmp-conflict-side">
                    <div class="cmp-conflict-side-lbl">${sourceTag(side.source, si)}</div>
                    <div class="cmp-conflict-side-text">${esc(side.stance)}</div>
                  </div>`).join('')}
              </div>
              ${c.nature ? `<div style="margin-top:10px;font-size:12px;color:var(--text5);font-style:italic;font-family:'Crimson Pro',serif">${esc(c.nature)}</div>` : ''}
            </div>`).join('')}
        </div>`;
      } else if (mode !== 'consensus') {
        html += `<div class="cmp-section"><div class="cmp-section-title">⚡ Conflicts</div><div style="font-size:12px;color:var(--text5);padding:8px 0">No conflicts found — analyses are in agreement.</div></div>`;
      }

      // ── Consensus ──
      const consensus = json.consensus || [];
      if (consensus.length > 0) {
        html += `<div class="cmp-section">
          <div class="cmp-section-title">✓ Consensus <span class="cmp-section-count">${consensus.length} shared findings</span></div>
          ${consensus.map(c => `
            <div class="cmp-issue-card consensus">
              <div>${sevTag(c.sev)}<span class="cmp-issue-tag consensus-tag">Consensus</span>${(c.sources || []).map((s,i) => sourceTag(s,i)).join('')}</div>
              <div style="font-size:12px;color:var(--text4);font-family:'JetBrains Mono',monospace;margin-bottom:6px">${esc(c.element)}</div>
              <div class="cmp-issue-body">${esc(c.finding)}</div>
            </div>`).join('')}
        </div>`;
      }

      // ── All Issues ──
      const allIssues = json.allIssues || [];
      if (allIssues.length > 0 && mode !== 'conflicts') {
        // Group by source
        const grouped = {};
        allIssues.forEach(issue => {
          if (!grouped[issue.source]) grouped[issue.source] = [];
          grouped[issue.source].push(issue);
        });

        html += `<div class="cmp-section">
          <div class="cmp-section-title">📋 All Issues <span class="cmp-section-count">${allIssues.length} total (verbatim)</span></div>
          ${Object.entries(grouped).map(([src, issues]) => `
            <div style="margin-bottom:20px">
              <div style="font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--text5);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">
                ${sourceTag(src, 0)} — ${issues.length} issue${issues.length !== 1 ? 's' : ''}
              </div>
              ${issues.map(issue => `
                <div class="cmp-issue-card" style="margin-bottom:8px">
                  <div style="margin-bottom:6px">${sevTag(issue.sev)}<span style="font-size:12px;color:var(--text4);font-family:'JetBrains Mono',monospace">${esc(issue.element)}</span></div>
                  <div class="cmp-issue-body">${esc(issue.body)}</div>
                </div>`).join('')}
            </div>`).join('')}
        </div>`;
      }

      output.innerHTML = html || `<div class="cmp-placeholder"><p>No results to display for this mode.</p></div>`;
    }

    function openCmpVR(rawJSON) {
      // Parse stored JSON and build a text summary to feed into the VR system
      try {
        const json = typeof rawJSON === 'string' ? JSON.parse(rawJSON) : rawJSON;
        let text = '';
        if (json.conflicts?.length) {
          text += '## Conflicts\n\n';
          json.conflicts.forEach(c => {
            text += `### ${c.element} [${c.sev}]\n`;
            (c.sides || []).forEach(s => { text += `**${s.source}:** ${s.stance}\n\n`; });
            if (c.nature) text += `*${c.nature}*\n\n`;
          });
        }
        if (json.consensus?.length) {
          text += '## Consensus Findings\n\n';
          json.consensus.forEach(c => {
            text += `### ${c.element}\n${c.finding}\n\n`;
          });
        }
        if (json.allIssues?.length) {
          text += '## All Issues\n\n';
          const grouped = {};
          json.allIssues.forEach(i => { (grouped[i.source] = grouped[i.source] || []).push(i); });
          Object.entries(grouped).forEach(([src, issues]) => {
            text += `### ${src}\n`;
            issues.forEach(i => { text += `- **${i.element}** [${i.sev}]: ${i.body}\n`; });
            text += '\n';
          });
        }
        // Pre-load VR modal with this text
        document.getElementById('vr-source').value = 'paste';
        document.getElementById('vr-paste').value = text;
        document.getElementById('vr-paste').style.display = 'block';
        document.getElementById('vr-title').value = 'Conflict Analysis Report';
        document.getElementById('vr-subtitle').value = '';
        document.getElementById('vr-status-msg').textContent = '';
        document.getElementById('vr-overlay').classList.add('open');
      } catch(e) {
        alert('Could not open Visual Report: ' + e.message);
      }
    }

    function renderPipelineSteps() {

          const conn = document.createElement('div');
          conn.className = 'connector';
          conn.textContent = APP.pipeline.mode === 'refine' ? '↓ output feeds next' : '↓';
          container.appendChild(conn);
        }
        const div = document.createElement('div');
        div.className = 'pipe-step';

        const cat = CATEGORIES.find(c => c.id === step.cat) || CATEGORIES[0];

          </select>
          <select class="step-sel" id="step_pr_${step.id}">
            ${stepPrompts.map(sp => `<option value="${sp.id}"${sp.id === step.promptId ? ' selected' : ''}>${esc(sp.title)}</option>`).join('')}
          </select>
        </div>
        <button class="step-rm" data-id="${step.id}">×</button>
      </div>
      <div class="step-body" id="step_body_${step.id}"></div>`;

        container.appendChild(div);

        // Remove
        div.querySelector('.step-rm').addEventListener('click', () => {

        // Category change

          s.promptId = newPrompts[0]?.id || '';
          s.fields = {};
          renderPipelineSteps();
        });

        // Prompt change
        div.querySelector(`#step_pr_${step.id}`).addEventListener('change', e => {
          const s = APP.pipeline.steps.find(x => x.id === step.id);
          s.promptId = e.target.value;
          s.fields = {};
          renderPipelineSteps();
        });

        // Step body
        renderStepBody(step, i, pr);
      });
    }

    function renderStepBody(step, i, pr) {
      const body = document.getElementById(`step_body_${step.id}`); if (!body || !pr) return;
      const firstTA = pr.fields.find(f => f.type === 'textarea');
      const canPipe = i > 0 && APP.pipeline.mode === 'refine' && firstTA;

      body.innerHTML = `
    ${canPipe ? `
      <div class="pipe-tog">
        <input type="checkbox" id="useprev_${step.id}" ${step.usePrev ? 'checked' : ''}>
        <label for="useprev_${step.id}">Use output from previous step as "${esc(firstTA.label)}"</label>
      </div>`: ''}
    <div class="pipe-tog">
      <input type="checkbox" id="style_dna_${step.id}" ${step.applyStyleDNA ? 'checked' : ''}>
      <label for="style_dna_${step.id}">🎨 Apply Style DNA <span style="color:#d44;font-size:10px">(requires AI)</span></label>
    </div>
    ${pr.fields.map(f => {
        const isPiped = canPipe && step.usePrev && f === firstTA;
        return `
        <div class="step-field">
          <label>${esc(f.label)}</label>
          ${isPiped
            ? `<div class="step-piped">← Will receive output from Step ${i}</div>`
            : f.type === 'textarea'
              ? `<textarea data-key="${f.key}" placeholder="${esc(f.label)}…" rows="3">${esc(step.fields[f.key] || '')}</textarea>`
              : `<input type="text" data-key="${f.key}" placeholder="${esc(f.label)}…" value="${esc(step.fields[f.key] || '')}">`
          }
        </div>`
      }).join('')}`;

      if (canPipe) {
        body.querySelector(`#useprev_${step.id}`).addEventListener('change', e => {
          step.usePrev = e.target.checked;
          renderStepBody(step, i, pr);
        });
      }
      const styleDnaCheck = body.querySelector(`#style_dna_${step.id}`);
      if (styleDnaCheck) {
        styleDnaCheck.addEventListener('change', e => {
          step.applyStyleDNA = e.target.checked;
        });
      }
      body.querySelectorAll('[data-key]').forEach(el => {
        el.addEventListener('input', e => { step.fields[e.target.dataset.key] = e.target.value; });
      });
    }

    async function runPipeline() {
      if (APP.pipeline.steps.length === 0) return;
      const runBtn = document.getElementById('pipe_run'); if (!runBtn) return;
      if (APP.pipeline.running) return;

      APP.pipeline.running = true;
      APP.pipeline.results = APP.pipeline.steps.map(s => ({ id: s.id, name: (PROMPTS[s.cat] || []).find(p => p.id === s.promptId)?.title || 'Step', status: 'waiting', text: '' }));
      runBtn.textContent = 'Running…'; runBtn.classList.add('running'); runBtn.disabled = true;
      document.getElementById('pipe_save').disabled = true;
      renderPipelineResults();

      const ctx = buildContext();
      let prevOutput = '';

      for (let i = 0; i < APP.pipeline.steps.length; i++) {
        const step = APP.pipeline.steps[i];
        const pr = (PROMPTS[step.cat] || []).find(p => p.id === step.promptId);
        if (!pr) continue;

        // Build fields for this step
        const fields = { ...step.fields };
        if (i > 0 && APP.pipeline.mode === 'refine' && step.usePrev) {
          const firstTA = pr.fields.find(f => f.type === 'textarea');
          if (firstTA) fields[firstTA.key] = prevOutput;
        } else if (i > 0 && APP.pipeline.mode === 'parallel' && !fields[pr.fields.find(f => f.type === 'textarea')?.key]) {
          // parallel: keep original text from step 0's output if available
        }

        const prompt = ctx + pr.tpl(fields);

        // Update result status
        APP.pipeline.results[i].status = 'running';
        APP.pipeline.results[i].text = '';
        renderPipelineResults();

        await new Promise((resolve) => {
          APP.pipeline.abortCtrl = new AbortController();
          callAPI(prompt,
            chunk => {
              APP.pipeline.results[i].text += chunk;
              const el = document.getElementById(`res_text_${step.id}`);
              if (el) { el.textContent = APP.pipeline.results[i].text; }
            },
            () => {
              APP.pipeline.results[i].status = 'done';
              prevOutput = APP.pipeline.results[i].text;
              updateResultStatus(step.id, 'done');
              resolve();
            },
            err => {
              APP.pipeline.results[i].status = 'err';
              APP.pipeline.results[i].text = 'Error: ' + err;
              updateResultStatus(step.id, 'err');
              resolve();
            },
            APP.pipeline.abortCtrl.signal
          );
        });
        // Small pause between steps
        if (i < APP.pipeline.steps.length - 1) await new Promise(r => setTimeout(r, 300));
      }

      APP.pipeline.running = false;
      runBtn.textContent = '▶ Run All Steps'; runBtn.classList.remove('running'); runBtn.disabled = false;
      const allDone = APP.pipeline.results.every(r => r.status === 'done');
      document.getElementById('pipe_save').disabled = !allDone;
      document.getElementById('pipe_copy_all').disabled = !allDone;
      document.getElementById('pipe_save_all').disabled = !allDone;
      document.getElementById('res_summary').textContent = `${APP.pipeline.results.filter(r => r.status === 'done').length}/${APP.pipeline.steps.length} completed`;
    }

    function updateResultStatus(stepId, status) {
      const el = document.getElementById(`res_status_${stepId}`);
      if (el) { el.className = `res-step-status ${status}`; el.textContent = status === 'done' ? 'Done' : status === 'running' ? 'Running…' : 'Error'; }
    }

    function renderPipelineResults() {
      const content = document.getElementById('res_content'); if (!content) return;
      if (APP.pipeline.results.length === 0) {
        content.innerHTML = '<div class="res-empty">Add steps and run to see results here</div>';
        return;
      }
      content.innerHTML = '';
      APP.pipeline.results.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'res-step';
        const statusLabel = r.status === 'done' ? 'Done' : r.status === 'running' ? 'Running…' : r.status === 'err' ? 'Error' : 'Waiting';
        div.innerHTML = `
      <div class="res-step-hd">
        <div class="res-step-num">${i + 1}</div>
        <div class="res-step-name">${esc(r.name)}</div>
        <div class="res-step-status ${r.status}" id="res_status_${r.id}">${statusLabel}</div>
      </div>
      <div class="res-step-text" id="res_text_${r.id}">${esc(r.text) || '<span style="color:#281e14;font-style:italic">Waiting…</span>'}</div>`;
        content.appendChild(div);
      });
    }

          storageActions.innerHTML = '<span style="color:var(--text2);font-size:12px">You will be prompted for API keys when needed</span>';
          storageStatus.textContent = '';

        try {
          const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models', {
            headers: { 'x-goog-api-key': APP.apiKeys.google }
          });
          if (res.ok) {
            status.className = 'api-status ok';
            status.textContent = '✓ Connected';
          } else {
            const j = await res.json().catch(() => ({ error: { message: 'Unknown error' } }));
            status.className = 'api-status err';
            status.textContent = '✗ ' + ((j.error?.message) || `HTTP ${res.status}`);

          status.className = 'api-status err';

      // Test LM Studio & Fetch Models
      p.querySelector('#test_btn_lmstudio').addEventListener('click', async () => {
        const status = p.querySelector('#api_status_lmstudio');
        const baseUrl = (p.querySelector('#lmstudio_url').value || 'http://localhost:1234').replace(/\/$/, '');
        status.className = 'api-status checking'; status.textContent = 'Testing…';
        try {
          // Try LM Studio's native API endpoint first
          let models = [];
          let foundModels = false;
          let errorMsg = '';

          // Try the LM Studio native models endpoint
          try {
            const res = await fetch(`${baseUrl}/api/v0/models`);
            if (res.ok) {
              const j = await res.json();
              models = j.models || [];
              foundModels = true;
            } else {
              errorMsg = `HTTP ${res.status}`;
            }
          } catch (e) { errorMsg = e.message; }

          // If not found, try OpenAI compatible endpoint
          if (!foundModels || models.length === 0) {
            try {
              const res = await fetch(`${baseUrl}/v1/models`, {
                method: 'GET',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' }
              });
              if (res.ok) {
                const j = await res.json();
                models = j.data || [];
                foundModels = true;
              } else {
                errorMsg = `HTTP ${res.status}`;
              }
            } catch (e) { errorMsg = e.message; }
          }

          status.className = 'api-status ok';
          if (models.length > 0) {
            status.textContent = `✓ Connected (${models.length} models found)`;
            // Add models to MODELS array dynamically
            models.forEach(m => {
              const modelId = m.id || m;
              const existing = MODELS.find(ex => ex.id === modelId && ex.provider === 'lmstudio');
              if (!existing) {
                MODELS.push({
                  id: modelId,
                  name: modelId,
                  provider: 'lmstudio',
                  ctx: 'varies',
                  color: '#888888'
                });
              }
            });
            // Switch to LM Studio provider and update model list
            APP.provider = 'lmstudio';
            localStorage.setItem('na_provider', 'lmstudio');
            renderSettings();
          } else if (errorMsg) {
            status.textContent = `✓ Connected (enter model name manually below)`;
            // Still switch to LM Studio so user can manually enter model
            APP.provider = 'lmstudio';
            localStorage.setItem('na_provider', 'lmstudio');
            renderSettings();
          } else if (!foundModels) {
            status.textContent = `✓ Connected (enter model name manually below)`;
            APP.provider = 'lmstudio';
            localStorage.setItem('na_provider', 'lmstudio');
            renderSettings();
          } else {
            status.textContent = '✓ Connected (no models loaded - load a model in LM Studio first)';
          }
        } catch (e) {
          status.className = 'api-status err';
          let msg = e.message;
          if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
            msg = 'Could not connect. Is LM Studio running with Server enabled?';
          }
          status.textContent = '✗ ' + msg;
        }
      });

      // Model selection
      p.querySelectorAll('.model-row').forEach(row => {

            const data = JSON.parse(event.target.result);
            // Validate required fields
            if (!data.series || !data.book || !data.chapter) {
              throw new Error('Invalid project file: missing required data');

            const importAsNew = confirm('Import as a NEW project? Click OK for new project, Cancel to merge with current project.');

            if (importAsNew) {

              APP.genreCompare = data.genreCompare || { preset: 'fantasy', customText: '' };

              setCurrentProjectId(pid);
              saveProjectState(pid);
              saveGenreCompare(pid, APP.genreCompare);
              renderProjectSelector();
            } else {
              const wipeFirst = p.querySelector('#import_wipe').checked;
              if (wipeFirst) {
                const pid = getCurrentProjectId();
                APP.series = data.series || { name: '', subName: '', bible: mkSec() };
                APP.book = data.book || { title: '', bookNum: '', totalBooks: '', subNum: '', totalSub: '', bible: mkSec(), outline: mkSec(), chars: [{ id: mkId(), ...mkSec() }] };
                APP.chapter = data.chapter || { mode: 'chapter', chapterNum: '', sceneNum: '', useFullChapters: false, sceneLevel: false, fullChapters: [], breakdowns: [], breakdown: mkSec(), settings: [{ id: mkId(), ...mkSec() }] };
                if (data.genreCompare) {
                  APP.genreCompare = { ...data.genreCompare };
                  saveGenreCompare(pid, APP.genreCompare);
                }
              } else {
                // Merge mode - combine data
                if (data.series) {
                  if (data.series.name) APP.series.name = data.series.name;
                  if (data.series.subName) APP.series.subName = data.series.subName;
                  if (data.series.bible?.text) APP.series.bible.text = (APP.series.bible.text || '') + '\n\n' + data.series.bible.text;
                }
                if (data.book) {
                  if (data.book.title) APP.book.title = data.book.title;
                  if (data.book.bookNum) APP.book.bookNum = data.book.bookNum;
                  if (data.book.totalBooks) APP.book.totalBooks = data.book.totalBooks;
                  if (data.book.subNum) APP.book.subNum = data.book.subNum;
                  if (data.book.totalSub) APP.book.totalSub = data.book.totalSub;
                  if (data.book.bible?.text) APP.book.bible.text = (APP.book.bible.text || '') + '\n\n' + data.book.bible.text;
                  if (data.book.outline?.text) APP.book.outline.text = (APP.book.outline.text || '') + '\n\n' + data.book.outline.text;
                  if (data.book.chars?.length) {
                    data.book.chars.forEach(c => {
                      if (!APP.book.chars.find(existing => existing.id === c.id)) {
                        APP.book.chars.push(c);
                      }
                    });
                  }
                }
                if (data.chapter) {
                  if (data.chapter.mode) APP.chapter.mode = data.chapter.mode;
                  if (data.chapter.chapterNum) APP.chapter.chapterNum = data.chapter.chapterNum;
                  if (data.chapter.sceneNum) APP.chapter.sceneNum = data.chapter.sceneNum;
                  if (data.chapter.useFullChapters !== undefined) APP.chapter.useFullChapters = data.chapter.useFullChapters;
                  if (data.chapter.fullChapters?.length) {
                    data.chapter.fullChapters.forEach(c => {
                      if (!APP.chapter.fullChapters.find(existing => existing.id === c.id)) {
                        APP.chapter.fullChapters.push(c);
                      }
                    });
                  }
                  if (data.chapter.breakdown?.text) APP.chapter.breakdown.text = (APP.chapter.breakdown.text || '') + '\n\n' + data.chapter.breakdown.text;
                  if (data.chapter.settings?.length) {
                    data.chapter.settings.forEach(s => {
                      if (!APP.chapter.settings.find(existing => existing.id === s.id)) {
                        APP.chapter.settings.push(s);
                      }
                    });
                  }
                }
                if (data.genreCompare) {
                  const pid = getCurrentProjectId();
                  APP.genreCompare = { ...APP.genreCompare, ...data.genreCompare };
                  saveGenreCompare(pid, APP.genreCompare);
                }
              }
            }
            saveState();
            renderSeries(); renderBook(); renderChapter();
            importStatus.textContent = importAsNew ? 'Imported as new project!' : 'Import successful!';
            importStatus.style.color = '#50a060';
            setTimeout(() => { importStatus.textContent = ''; }, 3000);
          } catch (err) {
            importStatus.textContent = 'Error: ' + err.message;
            importStatus.style.color = '#b05040';
          }
        };
        reader.readAsText(file);
        importFileInput.value = '';
      });

    function renderHelpWelcome(container) {
      container.innerHTML = `
    <div class="help-section">
      <h3>Welcome to The Novelist's Atelier</h3>
      <p>Your AI-powered writing assistant for editing and world-building across multi-book projects.</p>

      container.innerHTML = `

    // Activity Log Functions
    function getActivityLog() {
      try {
        return JSON.parse(localStorage.getItem('na_activity_log')) || [];
      } catch { return []; }
    }

    function addActivityLogEntry(desc) {
      const log = getActivityLog();
      const entry = {
        time: new Date().toLocaleString(),
        desc: desc
      };
      log.push(entry);
      if (log.length > 50) {
        log.shift(); // Remove oldest
      }
      localStorage.setItem('na_activity_log', JSON.stringify(log));
    }

    // ═══════════════════════════════════════════════════════════
    // KEYBOARD SHORTCUTS
    // ═══════════════════════════════════════════════════════════

    document.addEventListener('keydown', function (e) {
      const isMod = e.ctrlKey || e.metaKey;
      const key = e.key.toLowerCase();

      // Escape - close modals
      if (key === 'escape') {
        const modals = document.querySelectorAll('[class$="modal-overlay"], [class$="modal-overlay open"]');
        modals.forEach(m => {
          if (m.classList.contains('open')) {
            m.classList.remove('open');
            if (m.id) window['close' + m.id.charAt(0).toUpperCase() + m.id.slice(1).replace('_', '').replace('modal', 'Modal') + 'Modal']?.();
          }
        });
        return;
      }

      // F1 - Open Help
      if (key === 'f1') {
        e.preventDefault();
        showTab('help');
        return;
      }

      if (!isMod) return;

      // Ctrl/Cmd + Number - Switch tabs
      if (key >= '1' && key <= '8') {
        e.preventDefault();
        const tabIndex = parseInt(key) - 1;
        const tabs = TABS[tabIndex];
        if (tabs) {
          showTab(tabs.id);
        }
        return;
      }

      // Ctrl/Cmd + S - Force save
      if (key === 's') {
        e.preventDefault();
        clearTimeout(saveTimer);
        const pid = getCurrentProjectId();
        saveProjectState(pid);
        saveGenreCompare(pid, APP.genreCompare);
        updateStatsDisplay();
        showToast('Saved!');
        return;
      }

      // Ctrl/Cmd + J - Scene Navigator
      if (key === 'j') {
        e.preventDefault();
        toggleSceneNavigator();
        return;
      }

      // Ctrl/Cmd + F - Search
      if (key === 'f') {
        e.preventDefault();
        openSearchModal();
        return;
      }

      // Ctrl/Cmd + N - New item
      if (key === 'n') {
        e.preventDefault();
        if (APP.tab === 'story') {
          window.addCharacter?.();
        } else if (APP.tab === 'chapter') {
          if (APP.chapter.useFullChapters) {
            APP.chapter.fullChapters.push({ id: mkId(), title: '', text: '' });
          } else {
            APP.chapter.breakdowns.push({ id: mkId(), text: '' });
          }
          saveState();
          renderChapter();
        } else if (APP.tab === 'series') {
          // Add new series section if needed
        }
        showToast('New item added');
        return;
      }

      // Ctrl/Cmd + Enter - Run prompt
      if (key === 'enter') {
        e.preventDefault();
        const runBtn = document.querySelector('#prompt-editor-run');
        if (runBtn) runBtn.click();
        return;
      }
    });

    function showToast(msg) {
      const existing = document.getElementById('toast-notification');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.id = 'toast-notification';
      toast.textContent = msg;
      toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1a1512;border:1px solid #c8a660;color:var(--text2);padding:10px 20px;border-radius:4px;font-size:12px;z-index:9999;animation:fadeIn 0.2s';
      document.body.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 2000);
    }

    // ═══════════════════════════════════════════════════════════
    // TAB NAVIGATION
    // ═══════════════════════════════════════════════════════════

    const RENDER_FNS = { home: renderHome, series: renderSeries, book: renderBook, chapter: renderChapter, story: renderStory, prompts: renderPrompts, pipeline: renderPipeline, compare: renderCompare, settings: renderSettings, help: renderHelp };
    const rendered = {};

    function showTab(id) {
      APP.tab = id;
      localStorage.setItem('na_tab', id);
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`panel-${id}`)?.classList.add('active');
      if (!rendered[id]) { RENDER_FNS[id]?.(); rendered[id] = true; }
    }

    function updateTabDot() {
      const hasCtx = getContextPills().length > 0;
      const hasKey = !!APP.apiKey;
      const prBtn = document.querySelector('[data-tab="prompts"]');
      const setBtn = document.querySelector('[data-tab="settings"]');
      if (prBtn) {
        const dot = prBtn.querySelector('.tab-dot');
        if (hasCtx && !dot) {
          const d = document.createElement('span'); d.className = 'tab-dot';
          prBtn.appendChild(d);
        } else if (!hasCtx && dot) dot.remove();
      }
    }

    // Extract from Chapters function
    function runExtract(type) {
      const text = document.getElementById('extract_text').value;
      if (!text.trim()) { alert('Please paste chapter text first.'); return; }

      let prompt = '';
      if (type === 'character') {
        prompt = `Extract all distinct characters from the following text. For each character, provide: Name, Role, Key Traits, Physical Description (if mentioned), Speech Style, and any character development moments.\n\nTEXT:\n${text}`;
      } else if (type === 'world') {
        prompt = `Extract all world-building elements from the following text. Include: Magic/Technology systems, Factions/Groups, Historical events mentioned, Social structures, Geography/Setting details, Rules or laws, and any unique terminology.\n\nTEXT:\n${text}`;
      } else if (type === 'location') {
        prompt = `Extract all locations from the following text. For each location provide: Name, Description, Atmosphere/Mood, Key features, and any significance to the plot.\n\nTEXT:\n${text}`;
      }

      const outputEl = document.getElementById('extract_output');
      const resultEl = document.getElementById('extract_result');
      resultEl.style.display = 'block';
      outputEl.value = 'Processing...';

      callAPI(prompt,
        chunk => { outputEl.value += chunk; },
        () => { outputEl.value += '\n\n[Done]'; },
        err => { outputEl.value = 'Error: ' + err; },
        null
      );
    }

    function setupExtractButtons() {
      document.getElementById('extract_chars')?.addEventListener('click', () => runExtract('character'));
      document.getElementById('extract_world')?.addEventListener('click', () => runExtract('world'));
      document.getElementById('extract_locs')?.addEventListener('click', () => runExtract('location'));
    }

    function generateBookBibleFromChapters() {
      const chapters = APP.chapter.fullChapters?.filter(c => c.text?.trim()) || [];
      if (chapters.length === 0) {
        alert('No chapters found. Add chapters in the Chapter tab first.');

    function autoToggleContext() {
      const chapterText = getFullChapterText();
      if (!chapterText) {
        alert('Please add some chapter text first to analyze context.');
        return;

      const textLower = chapterText.toLowerCase();
      let toggledCount = 0;

      if (APP.book && APP.book.chars) {
        APP.book.chars.forEach(char => {
          const nameLine = char.text ? char.text.split('\n')[0].toLowerCase().trim() : '';
          if (nameLine && textLower.includes(nameLine)) {

            toggledCount++;

      if (APP.chapter && APP.chapter.settings) {
        APP.chapter.settings.forEach(setting => {
          const nameLine = setting.text ? setting.text.split('\n')[0].toLowerCase().trim() : '';
          if (nameLine && textLower.includes(nameLine)) {

            toggledCount++;

    function analyzeLocalText() {
      const chapterText = getFullChapterText();
      if (!chapterText) {
        alert('Please add some chapter text first to analyze.');
        return;
      }

      const adverbs = (chapterText.match(/\b\w+ly\b/gi) || []).length;
      const passive = (chapterText.match(/\b(was|were|is|are|been|being|be)\s+\w+ed\b/gi) || []).length;
      const filterWords = (chapterText.match(/\b(saw|felt|heard|noticed|realized|watched|looked|seemed)\b/gi) || []).length;

      let crutchCount = 0;
      if (APP.writingPrefs && APP.writingPrefs.doNotUseWords) {
        const crutchWords = APP.writingPrefs.doNotUseWords.split(',').map(w => w.trim()).filter(w => w);
        if (crutchWords.length > 0) {
          const regex = new RegExp('\\b(' + crutchWords.join('|') + ')\\b', 'gi');
          crutchCount = (chapterText.match(regex) || []).length;
        }
      }

      const wordCount = chapterText.split(/\s+/).filter(w => w.length > 0).length;

      const report = '📊 Local Text Analysis Report\n' +
        '-----------------------------------\n' +
        'Word Count: ' + wordCount + '\n\n' +
        '🏃 Adverbs (-ly): ' + adverbs + ' (' + ((adverbs / wordCount) * 100).toFixed(1) + '%)\n' +
        '🥱 Passive Voice: ' + passive + ' instances\n' +
        '👁️ Filter Words: ' + filterWords + ' instances\n' +
        '🚫 Crutch Words: ' + crutchCount + ' instances\n\n' +
        'Tip: Try to keep adverbs under 1.5% and minimize filter words to strengthen your prose!';

      alert(report);
    }

    function getGranularTokenBreakdown(promptTemplate, fields) {
      const ctxParts = { series: 0, book: 0, characters: 0, chapter: 0, settings: 0, prompt: 0 };
      const est = (text) => text ? Math.round(text.length / 4) : 0;

      if (APP.series && APP.series.bible && APP.series.bible.inclusion !== 'off' && APP.series.bible.text) {
        ctxParts.series += est(APP.series.bible.text);
      }

      if (APP.book) {
        if (APP.book.bible && APP.book.bible.inclusion !== 'off' && APP.book.bible.text) {
          ctxParts.book += est(APP.book.bible.text);
        }
        if (APP.book.outline && APP.book.outline.inclusion !== 'off' && APP.book.outline.text) {
          ctxParts.book += est(APP.book.outline.text);
        }
        if (APP.book.chars) {
          APP.book.chars.forEach(c => {
            if (c.inclusion !== 'off' && c.text) ctxParts.characters += est(c.text);
          });
        }
      }

      if (APP.chapter) {
        if (APP.chapter.useFullChapters && APP.chapter.fullChapters) {
          APP.chapter.fullChapters.forEach(c => {
            if (c.text) ctxParts.chapter += est(c.text);
            if (c.scenes) c.scenes.forEach(s => { if (s.content) ctxParts.chapter += est(s.content); });
          });
        } else if (APP.chapter.breakdowns) {
          APP.chapter.breakdowns.forEach(b => { if (b.text) ctxParts.chapter += est(b.text); });
        }

        if (APP.chapter.settings) {
          APP.chapter.settings.forEach(s => { if (s.inclusion !== 'off' && s.text) ctxParts.settings += est(s.text); });
        }
      }

      const prefs = buildWritingPrefsInstructions ? buildWritingPrefsInstructions() : '';
      const genre = buildGenreCompareInstructions ? buildGenreCompareInstructions() : '';
      const basePrompt = genre + prefs + (promptTemplate ? promptTemplate(fields || {}) : '');
      ctxParts.prompt = est(basePrompt);

      const total = Object.values(ctxParts).reduce((a, b) => a + b, 0);
      return { parts: ctxParts, total };
    }

        '👥 Characters: ~' + breakdown.parts.characters + ' (' + pct(breakdown.parts.characters) + '%)\n' +

    function getTemplateFieldsFromUI() {
      const rows = document.querySelectorAll('#template_fields .template-field-row');
      const fields = [];
      rows.forEach(row => {
        const key = row.querySelector('.field-key').value.trim();
        const label = row.querySelector('.field-label').value.trim();
        const type = row.querySelector('.field-type').value;
        if (key && label) {
          fields.push({ key, label, type });
        }
      });
      return fields;
    }

    function previewTemplate() {
      const title = document.getElementById('template_title').value;
      const fields = getTemplateFieldsFromUI();
      let tpl = document.getElementById('template_tpl').value;

      // Replace ${f.fieldname} with [fieldname] for preview
      fields.forEach(f => {
        const regex = new RegExp('\\$\\{f\\.' + f.key + '\\}', 'g');
        tpl = tpl.replace(regex, '[' + f.label + ']');
      });

      document.getElementById('template_preview').textContent = tpl || '(No template content)';
    }

    function saveTemplate() {
      const title = document.getElementById('template_title').value.trim();
      const desc = document.getElementById('template_desc').value.trim();
      const catId = document.getElementById('template_cat').value;
      const fields = getTemplateFieldsFromUI();
      const tpl = document.getElementById('template_tpl').value;

      if (!title) {
        alert('Title is required');
        return;
      }
      if (fields.length === 0) {
        alert('At least one field is required');
        return;
      }
      if (!tpl.trim()) {
        alert('Template content is required');
        return;
      }

      // Check all fields are used in template
      const usedKeys = [];
      fields.forEach(f => {
        if (tpl.includes('${f.' + f.key + '}')) {
          usedKeys.push(f.key);
        }
      });
      if (usedKeys.length < fields.length) {
        const unused = fields.filter(f => !usedKeys.includes(f.key)).map(f => f.key).join(', ');
        alert('Warning: These fields are not used in template: ' + unused);
      }

      const template = { title, desc, fields, tpl };

      if (editingTemplateId) {
        updateCustomTemplate(editingTemplateCat, editingTemplateId, template);
      } else {
        addCustomTemplate(catId, template);
      }

      closeTemplateModal();
      // Refresh prompts panel
      if (APP.currentTab === 'prompts') {
        renderPrompts();
      }
    }

    function deleteTemplate(catId, templateId) {
      if (!confirm('Delete this custom template? This cannot be undone.')) return;
      deleteCustomTemplate(catId, templateId);
      if (APP.prompts.promptId === templateId) {
        APP.prompts.promptId = null;
        APP.prompts.fields = {};
        APP.prompts.output = '';
      }
      if (APP.currentTab === 'prompts') {
        renderPromptList();
        renderPromptEditor();
      }
    }

    // Template Export/Import
    function exportTemplates() {
      const data = exportCustomTemplates();
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'novelist-atelier-templates-' + Date.now() + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importTemplates() {
      const input = document.getElementById('template_import_file');
      input.click();
    }

    document.getElementById('template_import_file').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (event) {
        try {
          JSON.parse(event.target.result); // Validate JSON
          const merge = confirm('Merge with existing templates? Click OK to merge, Cancel to replace all.');
          importCustomTemplates(event.target.result, merge);
          if (APP.currentTab === 'prompts') renderPrompts();
          alert('Templates imported successfully!');
        } catch (err) {
          alert('Error importing templates: ' + err.message);
        }
      };
      reader.readAsText(file);
      this.value = '';
    });

  <script>
  // ══ VISUAL REPORT FEATURE ══════════════════════════════════════════
  (function () {

    let vrMode = 'local'; // 'local' | 'api'

    document.querySelectorAll('.vr-mode-btn').forEach(btn => {

    // ── Open modal ───────────────────────────────────────────────────
    document.addEventListener('click', e => { if (e.target && e.target.id === 'vr_btn') openVRModal(); });

    function openVRModal() {
      const titleEl = document.getElementById('vr-title');
      if (!titleEl.value) {
        const cat = (typeof CATEGORIES !== 'undefined' ? CATEGORIES : []).find(c => c.id === APP.prompts.cat);

      }

      const hasOutput = !!(APP && APP.prompts && APP.prompts.output);
      const srcEl   = document.getElementById('vr-source');
      const pasteEl = document.getElementById('vr-paste');
      if (hasOutput) {
        srcEl.value = 'output';
        pasteEl.style.display = 'none';
      } else {
        srcEl.value = 'paste';
        pasteEl.style.display = 'block';
      }
      document.getElementById('vr-overlay').classList.add('open');
      titleEl.focus(); titleEl.select();

    document.getElementById('vr-modal-close').addEventListener('click', closeVRModal);
    document.getElementById('vr-cancel').addEventListener('click', closeVRModal);
    document.getElementById('vr-overlay').addEventListener('click', e => { if (e.target === document.getElementById('vr-overlay')) closeVRModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVRModal(); });
    function closeVRModal() { document.getElementById('vr-overlay').classList.remove('open'); }

    document.getElementById('vr-source').addEventListener('change', function () {
      document.getElementById('vr-paste').style.display = this.value === 'paste' ? 'block' : 'none';
    });

    // ── Copy Prompt (API mode only) ───────────────────────────────────
    document.getElementById('vr-copy-prompt').addEventListener('click', function () {
      const { titleVal, subtitleVal, rawText } = getVRInputs();
      if (!rawText) { setVRStatus('No text yet — paste your output first.', true); return; }
      navigator.clipboard.writeText(buildVRPrompt(rawText, titleVal, subtitleVal)).then(() => {
        this.textContent = '✓ Copied'; this.classList.add('ok');
        setVRStatus('Prompt copied — paste into Claude.ai or any chat app.');

    // ── Generate ──────────────────────────────────────────────────────
    document.getElementById('vr-generate').addEventListener('click', async function () {
      const { titleVal, subtitleVal, rawText } = getVRInputs();

      const genBtn = this;

          setVRStatus('Parse error: ' + err.message, true);
        }

        genBtn.textContent = '⬡ Generate';

      }

      // API mode
      const apiKey = await getApiKeyForProvider(APP.provider);
      if (!apiKey) { setVRStatus('No API key — add it in Settings.', true); genBtn.disabled = false; return; }

      genBtn.textContent = 'Generating…';
      setVRStatus('Calling AI… parsing structure, assembling template locally…');
      let jsonRaw = '';
      try {
        await callAPI(
          buildVRPrompt(rawText, titleVal, subtitleVal),
          chunk => { jsonRaw += chunk; },
          () => {
            try {
              // Strip any accidental fences
              let clean = jsonRaw.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```\s*$/i,'').trim();
              // Find first { in case model prefixed with text
              const start = clean.indexOf('{');
              if (start > 0) clean = clean.slice(start);
              const json = JSON.parse(clean);
              const html = assembleFromJSON(json, titleVal, subtitleVal);
              downloadHTML(html, titleVal);
              setVRStatus('✓ Report downloaded! (AI parsed · local template)');
            } catch (parseErr) {
              setVRStatus('JSON parse error — try again or use Local Parser. ' + parseErr.message, true);
            }
            genBtn.disabled = false; genBtn.textContent = '⬡ Generate';
          },
          err => { setVRStatus('Error: ' + err, true); genBtn.disabled = false; genBtn.textContent = '⬡ Generate'; },

        setVRStatus('Error: ' + (err.message || err), true);

    // ── Helpers ───────────────────────────────────────────────────────
    function getVRInputs() {
      return {
        titleVal:    (document.getElementById('vr-title').value    || '').trim() || 'Editorial Report',
        subtitleVal: (document.getElementById('vr-subtitle').value || '').trim(),
        rawText: document.getElementById('vr-source').value === 'paste'
          ? (document.getElementById('vr-paste').value || '').trim()
          : (APP && APP.prompts && APP.prompts.output || '')
      };
    }

    function setVRStatus(msg, isErr) {
      const el = document.getElementById('vr-status-msg');
      el.textContent = msg;
      el.style.color = isErr ? '#c06050' : '#c8a660';
    }

    function downloadHTML(html, title) {
      const slug = title.replace(/[^a-z0-9]+/gi,'-').toLowerCase().replace(/^-+|-+$/g,'');
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = (slug||'report') + '.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    }

    // ══ LOCAL JS PARSER ═══════════════════════════════════════════════
    function localParseReport(raw, title, subtitle) {
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

      // ── severity detection ──
      function severity(text) {
        const t = text.toLowerCase();
        if (/\b(critical|must.fix|must.change|must.resolve|error|conflict)\b/.test(t)) return 'critical';
        if (/\b(important|suggested?|should|recommend|flag|warning|issue)\b/.test(t)) return 'important';
        if (/\b(optional|minor|consider|nice.to.have|low.priority)\b/.test(t)) return 'minor';
        return null;
      }
      const sevColor = { critical:'#e74c3c', important:'#f39c12', minor:'#27ae60' };
      const sevLabel = { critical:'Critical', important:'Important', minor:'Minor' };
      const sevBg    = { critical:'rgba(231,76,60,0.08)', important:'rgba(243,156,18,0.06)', minor:'rgba(39,174,96,0.06)' };

      // ── inline markdown ──
      function inlineMd(s) {
        return esc(s)
          .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
          .replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g,         '<em>$1</em>')
          .replace(/`([^`]+)`/g,         '<code style="background:rgba(0,0,0,0.3);padding:1px 5px;border-radius:3px;font-size:0.9em;font-family:monospace">$1</code>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#e8c96e">$1</a>');
      }

      // ── split lines ──
      const lines = raw.split(/\r?\n/);

      // ── first pass: collect sections (h2/h3 become cards) ──
      const sections = [];
      let cur = null;

      function pushCur() { if (cur) { sections.push(cur); cur = null; } }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const h1 = line.match(/^#\s+(.+)/);
        const h2 = line.match(/^##\s+(.+)/);
        const h3 = line.match(/^###\s+(.+)/);

        if (h1) { pushCur(); /* h1 goes in hero only */ continue; }
        if (h2) {
          pushCur();
          cur = { title: h2[1].replace(/\*/g,''), lines: [], sev: severity(h2[1]) };
          continue;
        }
        if (h3 && cur) {
          cur.lines.push({ type:'h3', text: h3[1].replace(/\*/g,'') });
          continue;
        }
        if (cur) cur.lines.push({ type:'raw', text: line });
      }
      pushCur();

      // if no h2 headings found, treat whole text as one section
      if (sections.length === 0) {
        sections.push({ title: title, lines: lines.map(l => ({ type:'raw', text:l })), sev: null });
      }

      // ── render section content ──
      function renderLines(lineObjs) {
        const out = [];
        let i = 0;
        while (i < lineObjs.length) {
          const { type, text } = lineObjs[i];

          // h3
          if (type === 'h3') {
            out.push(`<h3 style="font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:#e8e4f0;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.07)">${inlineMd(text)}</h3>`);
            i++; continue;
          }

          const t = text;

          // blank line
          if (!t.trim()) { i++; continue; }

          // horizontal rule
          if (/^---+$/.test(t.trim())) {
            out.push('<hr style="border:none;border-top:1px solid rgba(232,201,110,0.15);margin:24px 0">');
            i++; continue;
          }

          // fenced code block
          if (/^```/.test(t)) {
            const lang = t.replace(/^```/,'').trim();
            const codeLines = [];
            i++;
            while (i < lineObjs.length && !/^```/.test(lineObjs[i].text)) {
              codeLines.push(esc(lineObjs[i].text)); i++;
            }
            i++; // skip closing ```
            out.push(`<div style="background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px 16px;margin:12px 0;font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:var(--text4);line-height:1.7;overflow-x:auto;white-space:pre-wrap">${codeLines.join('\n')}</div>`);
            continue;
          }

          // blockquote — check for Before/After pattern
          if (/^>\s*/.test(t)) {
            const bqLines = [];
            while (i < lineObjs.length && /^>\s*/.test(lineObjs[i].text)) {
              bqLines.push(lineObjs[i].text.replace(/^>\s*/,'')); i++;
            }
            const bqText = bqLines.join(' ');
            out.push(`<blockquote style="background:rgba(232,201,110,0.05);border-left:3px solid rgba(232,201,110,0.4);border-radius:0 8px 8px 0;margin:12px 0;padding:12px 16px;color:var(--text3);font-style:italic">${inlineMd(bqText)}</blockquote>`);
            continue;
          }

          // before/after comparison: look for **Before:** ... **After:** on consecutive items
          const isBefore = /^\*{0,2}Before:?\*{0,2}/i.test(t);
          if (isBefore) {
            const beforeText = t.replace(/^\*{0,2}Before:?\*{0,2}\s*/i,'');
            let afterText = '';
            let whyText = '';
            let j = i + 1;
            while (j < lineObjs.length && !lineObjs[j].text.trim()) j++;
            if (j < lineObjs.length && /^\*{0,2}After:?\*{0,2}/i.test(lineObjs[j].text)) {
              afterText = lineObjs[j].text.replace(/^\*{0,2}After:?\*{0,2}\s*/i,'');
              j++;
              while (j < lineObjs.length && !lineObjs[j].text.trim()) j++;
              if (j < lineObjs.length && /^\*{0,2}Why.{0,20}stronger/i.test(lineObjs[j].text)) {
                whyText = lineObjs[j].text.replace(/^\*{0,2}Why.{0,20}stronger:?\*{0,2}\s*/i,'');
                j++;
              }
              out.push(`<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.07);border-radius:8px;overflow:hidden;margin:14px 0">
                <div style="background:rgba(231,76,60,0.07);padding:14px 16px">
                  <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:#ff6b6b;margin-bottom:8px;font-weight:600">Before</div>
                  <div style="font-size:13px;color:#e8e4f0;line-height:1.7;font-style:italic">${inlineMd(beforeText)}</div>
                </div>
                <div style="background:rgba(39,174,96,0.07);padding:14px 16px">
                  <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:#6bffaa;margin-bottom:8px;font-weight:600">After</div>
                  <div style="font-size:13px;color:#e8e4f0;line-height:1.7">${inlineMd(afterText)}</div>
                </div>
                ${whyText ? `<div style="grid-column:1/-1;background:rgba(232,201,110,0.07);border-top:1px solid rgba(232,201,110,0.15);padding:10px 16px;font-size:12px;color:#e8c96e">${inlineMd(whyText)}</div>` : ''}
              </div>`);
              i = j; continue;
            }
          }

          // resolution / fix box
          if (/^[\*_]{0,2}(✓|resolution|fix|recommended\s+version):?[\*_]{0,2}/i.test(t)) {
            const label = t.match(/^[\*_]{0,2}(✓\s*\w*|resolution|fix|recommended\s+version)/i)?.[0].replace(/[\*_]/g,'') || '✓ Resolution';
            const resLines = [t.replace(/^[\*_]{0,2}(✓[^:]*|resolution|fix|recommended\s+version):?\s*[\*_]{0,2}\s*/i,'')];
            i++;
            while (i < lineObjs.length && lineObjs[i].text.trim() && !/^#/.test(lineObjs[i].text)) {
              resLines.push(lineObjs[i].text); i++;
            }
            out.push(`<div style="background:rgba(39,174,96,0.07);border:1px solid rgba(39,174,96,0.2);border-radius:8px;padding:16px 18px;margin:14px 0">
              <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:#6bffaa;margin-bottom:10px;font-weight:600">${esc(label.trim())}</div>
              <div style="font-size:13px;color:#e8e4f0;line-height:1.7">${resLines.map(inlineMd).join('<br>')}</div>
            </div>`);
            continue;
          }

          // numbered list item  (1. text)
          if (/^\d+\.\s/.test(t)) {
            const items = [];
            while (i < lineObjs.length && /^\d+\.\s/.test(lineObjs[i].text)) {
              const itemText = lineObjs[i].text.replace(/^\d+\.\s*/,'');
              const sev = severity(itemText);
              items.push({ text: itemText, sev });
              i++;
            }
            out.push('<ol style="list-style:none;padding:0;margin:10px 0;display:flex;flex-direction:column;gap:8px">');
            items.forEach((item, idx) => {
              const c = item.sev ? sevColor[item.sev] : '#e8c96e';
              const bg = item.sev ? sevBg[item.sev] : 'rgba(255,255,255,0.03)';
              out.push(`<li style="display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:${bg};border-radius:6px;border-left:2px solid ${c}">
                <span style="min-width:22px;height:22px;border-radius:50%;border:1px solid ${c};background:transparent;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${c};flex-shrink:0">${idx+1}</span>
                <span style="font-size:13px;color:#e8e4f0;line-height:1.6">${inlineMd(item.text)}</span>
              </li>`);
            });
            out.push('</ol>');
            continue;
          }

          // unordered list item
          if (/^[-*+]\s/.test(t)) {
            const items = [];
            while (i < lineObjs.length && /^[-*+]\s/.test(lineObjs[i].text)) {
              const itemText = lineObjs[i].text.replace(/^[-*+]\s*/,'');
              const sev = severity(itemText);
              items.push({ text: itemText, sev });
              i++;
            }
            out.push('<ul style="list-style:none;padding:0;margin:10px 0;display:flex;flex-direction:column;gap:6px">');
            items.forEach(item => {
              const c = item.sev ? sevColor[item.sev] : 'rgba(232,201,110,0.5)';
              const bg = item.sev ? sevBg[item.sev] : 'transparent';
              out.push(`<li style="display:flex;gap:10px;align-items:flex-start;padding:8px 12px;background:${bg};border-radius:6px${item.sev ? ';border-left:2px solid '+c : ''}">
                <span style="color:${c};margin-top:3px;flex-shrink:0">●</span>
                <span style="font-size:13px;color:#e8e4f0;line-height:1.6">${inlineMd(item.text)}</span>
              </li>`);
            });
            out.push('</ul>');
            continue;
          }

          // issue/flag card: line starting with a bold label that has severity
          const boldLabel = t.match(/^\*\*([^*]+)\*\*[:\s]/);
          if (boldLabel) {
            const label = boldLabel[1];
            const rest = t.slice(boldLabel[0].length);
            const sev = severity(label + ' ' + rest);
            if (sev) {
              const c = sevColor[sev];
              const bg = sevBg[sev];
              out.push(`<div style="background:${bg};border:1px solid ${c}33;border-left:3px solid ${c};border-radius:8px;padding:14px 18px;margin:10px 0">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                  <span style="background:${c}33;color:${c};font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:3px 10px;border-radius:999px;border:1px solid ${c}66">${sevLabel[sev]}</span>
                  <span style="font-size:14px;font-weight:600;color:#e8e4f0">${inlineMd(label)}</span>
                </div>
                <div style="font-size:13px;color:var(--text4);line-height:1.7">${inlineMd(rest)}</div>
              </div>`);
              i++; continue;
            }
          }

          // plain paragraph
          out.push(`<p style="font-size:14px;color:#c8c4d4;line-height:1.75;margin:8px 0">${inlineMd(t)}</p>`);
          i++;
        }
        return out.join('\n');
      }

      // ── build TOC + sidebar ──
      const tocEntries = sections.map((s, idx) => {
        const id = 'section-' + (idx + 1);
        return { id, title: s.title, num: String(idx + 1).padStart(2,'0') };
      });

      const sidebarLinks = tocEntries.map(e =>
        `<a href="#${e.id}" class="nav-link"><span class="nav-num">${e.num}</span>${esc(e.title)}</a>`
      ).join('\n');

      const tocGrid = tocEntries.map(e =>
        `<a href="#${e.id}" class="toc-entry"><span class="num">${e.num}</span><span class="title">${esc(e.title)}</span></a>`
      ).join('\n');

      // ── build section cards ──
      const cards = sections.map((s, idx) => {
        const id = tocEntries[idx].id;
        const num = idx + 1;
        const sev = s.sev;
        const accentColor = sev ? sevColor[sev] : '#e8c96e';
        return `<section id="${id}" class="section-card">
          <div class="section-header">
            <div class="section-badge">${num}</div>
            <div class="section-title-wrap" style="border-left:3px solid ${accentColor}">
              <h2 class="section-title">${esc(s.title)}</h2>
              ${sev ? `<p class="section-subtitle"><span style="color:${accentColor};font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">${sevLabel[sev]}</span></p>` : ''}
            </div>
          </div>
          ${renderLines(s.lines)}
        </section>`;
      }).join('\n');

      // ── assemble full HTML ──
      return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(title)}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

  --border-hv:rgba(232,201,110,0.3);
  --gold:#e8c96e;--gold-dim:rgba(232,201,110,0.15);
  --red:#e74c3c;--amber:#f39c12;--green:#27ae60;
  --text:#e8e4f0;--text-2:#9090b0;--text-3:#5a5a7a;
  --r:12px;--r-sm:8px;--r-pill:999px;
}

</head>
<body>

</nav>

    <div class="hero-rule"></div>
  </header>
  <main class="main-content">

    </nav>

  </main>
</div>
<script>

  a.addEventListener('click',e=>{
    const t=document.querySelector(a.getAttribute('href'));
    if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'})}
  });
});
const navLinks=document.querySelectorAll('.nav-link');
const sections=document.querySelectorAll('.section-card');
if('IntersectionObserver' in window){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const id=entry.target.id;
        navLinks.forEach(l=>{l.classList.toggle('active',l.getAttribute('href')==='#'+id)});
      }

  },{threshold:0.3});
  sections.forEach(s=>obs.observe(s));
}
<\/script>
